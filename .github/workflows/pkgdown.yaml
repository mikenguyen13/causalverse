# Deploy pre-built pkgdown site from docs/ folder.
# The site is built locally (because vignettes need 80+ optional packages)
# and committed to the docs/ directory. This workflow simply deploys it.
on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          clean: false
          branch: gh-pages
          folder: docs
